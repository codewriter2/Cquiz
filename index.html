<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C 프로그래밍 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface2: #eef1f6;
    --border: #dde2ec;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --danger: #dc2626;
    --warn: #d97706;
    --text: #1a1f2e;
    --text2: #4b5680;
    --text3: #9099b5;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.6;
  }
 
  /* 배경 도트 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(var(--border) 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.8;
    pointer-events: none;
    z-index: 0;
  }
 
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }
 
  /* 헤더 */
  .header {
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }
  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px;
    color: var(--text2);
  }
 
  /* 단원 선택 */
  #screen-select { animation: fadeUp 0.5s ease both; }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .unit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
  }
  .unit-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .unit-btn:hover { border-color: var(--accent2); color: var(--text); background: var(--surface2); }
  .unit-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(74,222,128,0.06);
  }
  .unit-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .unit-btn.selected .dot { background: var(--accent); }
 
  .start-btn {
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 32px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.18s;
    width: 100%;
  }
  .start-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
 
  /* 학번 입력 */
  .student-input-wrap {
    margin-bottom: 28px;
  }
  .input-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .text-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.18s;
  }
  .text-input:focus { border-color: var(--accent2); }
 
  /* 퀴즈 화면 */
  #screen-quiz { display: none; }
  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 99px;
    height: 4px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .q-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
  }
  .q-unit-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    background: rgba(96,165,250,0.1);
    border: 1px solid rgba(96,165,250,0.2);
    border-radius: 4px;
    padding: 2px 8px;
  }
  .question-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 20px;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.7;
    animation: fadeUp 0.35s ease both;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }
  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.35s ease both;
  }
  .option-btn:nth-child(2) { animation-delay: 0.04s; }
  .option-btn:nth-child(3) { animation-delay: 0.08s; }
  .option-btn:nth-child(4) { animation-delay: 0.12s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent2); color: var(--text); background: var(--surface2); }
  .option-btn .opt-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    width: 20px;
    flex-shrink: 0;
  }
  .option-btn.selected { border-color: var(--accent2); color: var(--text); background: rgba(96,165,250,0.06); }
  .option-btn.correct { border-color: var(--accent) !important; color: var(--accent) !important; background: rgba(74,222,128,0.08) !important; }
  .option-btn.wrong { border-color: var(--danger) !important; color: var(--danger) !important; background: rgba(248,113,113,0.08) !important; }
  .option-btn:disabled { cursor: default; }
 
  .next-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: var(--radius);
    padding: 13px 28px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    width: 100%;
  }
  .next-btn:hover { border-color: var(--accent); color: var(--accent); }
  .next-btn.primary {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
    font-weight: 600;
  }
  .next-btn.primary:hover { background: #1d4ed8; }
 
  /* 결과 화면 */
  #screen-result { display: none; }
  .score-display {
    text-align: center;
    padding: 48px 0 36px;
    animation: fadeUp 0.5s ease both;
  }
  .score-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-circle::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: rgba(74,222,128,0.05);
  }
  .score-num {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .score-total {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text3);
    margin-top: 4px;
  }
  .score-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .score-sub {
    font-size: 14px;
    color: var(--text2);
  }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text3);
  }
  .review-list { margin-bottom: 28px; }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 8px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    font-size: 13px;
  }
  .review-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .review-q { color: var(--text2); line-height: 1.6; }
  .review-ans { font-family: var(--mono); font-size: 12px; margin-top: 4px; }
  .review-ans .correct { color: var(--accent); }
  .review-ans .wrong-ans { color: var(--danger); }
 
  .notion-status {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notion-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--warn);
    animation: pulse 1.5s infinite;
  }
  .notion-status.success .dot { background: var(--accent); animation: none; }
  .notion-status.error .dot { background: var(--danger); animation: none; }
 
  .retry-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: var(--radius);
    padding: 13px 28px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    width: 100%;
  }
  .retry-btn:hover { border-color: var(--accent2); color: var(--accent2); }
 
  /* 로딩 */
  #screen-loading { display: none; text-align: center; padding: 80px 0; }
  .loader {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-tag">// C Programming</div>
    <h1>단원별 퀴즈</h1>
    <p>단원을 선택하고 학번을 입력한 후 퀴즈를 시작하세요.</p>
  </div>
 
  <!-- 단원 선택 화면 -->
  <div id="screen-select">
    <div class="student-input-wrap">
      <label class="input-label">학번</label>
      <input class="text-input" id="student-id" type="text" placeholder="학번을 입력하세요" />
    </div>
    <div class="student-input-wrap">
      <label class="input-label">이름</label>
      <input class="text-input" id="student-name" type="text" placeholder="이름을 입력하세요" />
    </div>
    <div class="section-label">단원 선택</div>
    <div class="unit-grid" id="unit-grid"></div>
    <button class="start-btn" id="start-btn" disabled onclick="startQuiz()">퀴즈 시작 →</button>
  </div>
 
  <!-- 로딩 -->
  <div id="screen-loading">
    <div class="loader"></div>
    <p style="color:var(--text3);font-family:var(--mono);font-size:13px;">문제를 불러오는 중...</p>
  </div>
 
  <!-- 퀴즈 화면 -->
  <div id="screen-quiz">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="q-meta">
      <span class="q-num" id="q-num"></span>
      <span class="q-unit-tag" id="q-unit-tag"></span>
    </div>
    <div class="question-box" id="question-text"></div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()">다음 문제 →</button>
  </div>
 
  <!-- 결과 화면 -->
  <div id="screen-result">
    <div class="score-display">
      <div class="score-circle">
        <div class="score-num" id="score-num"></div>
        <div class="score-total" id="score-total"></div>
      </div>
      <div class="score-title" id="score-title"></div>
      <div class="score-sub" id="score-sub"></div>
    </div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" style="color:var(--accent)" id="stat-correct"></div>
        <div class="stat-label">정답</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--danger)" id="stat-wrong"></div>
        <div class="stat-label">오답</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--accent2)" id="stat-rate"></div>
        <div class="stat-label">정답률</div>
      </div>
    </div>
    <div class="notion-status" id="notion-status">
      <div class="dot"></div>
      <span id="notion-status-text">노션에 결과 저장 중...</span>
    </div>
    <div class="section-label" style="margin-bottom:12px">오답 노트</div>
    <div class="review-list" id="review-list"></div>
    <button class="retry-btn" onclick="resetQuiz()">← 다시 풀기</button>
  </div>
</div>
 
<script>
const MAKE_WEBHOOK = 'https://hook.us2.make.com/wc9029vszisbdw39hninga5pf669s97k';
 
 
// 문항 데이터 (내장)
const ALL_QUESTIONS = [
  {q:'Q1. printf에서 double형 출력 형식 지정자는?',opts:['%d','%f','%lf','%g'],ans:3,unit:'변수와 자료형'},
  {q:'Q2. scanf에서 double형 입력 형식 지정자는?',opts:['%d','%f','%lf','%g'],ans:3,unit:'변수와 자료형'},
  {q:'Q3. short형의 범위는?',opts:['-128~127','-32768~32767','-2147483648~2147483647','0~65535'],ans:2,unit:'변수와 자료형'},
  {q:'Q4. sizeof(int)의 결과는? (32비트 기준)',opts:['1','2','4','8'],ans:3,unit:'변수와 자료형'},
  {q:'Q5. 변수의 값을 교환할 때 필요한 변수를 ___변수라고 한다',opts:['전역','지역','임시','포인터'],ans:3,unit:'변수와 자료형'},
  {q:'Q6. C언어에서 정수형 변수를 선언하는 키워드는?',opts:['integer','int','Integer','INT'],ans:2,unit:'변수와 자료형'},
  {q:'Q7. 다음 중 실수형 자료형이 아닌 것은?',opts:['float','double','long double','long int'],ans:4,unit:'변수와 자료형'},
  {q:'Q8. char형 변수의 크기는?',opts:['1바이트','2바이트','4바이트','8바이트'],ans:1,unit:'변수와 자료형'},
  {q:'Q9. 다음 중 올바른 변수명은?',opts:['1num','num-1','_num1','num 1'],ans:3,unit:'변수와 자료형'},
  {q:'Q10. unsigned int가 int와 다른 점은?',opts:['크기가 2배','음수를 표현 못함','소수점 표현 가능','더 빠른 연산'],ans:2,unit:'변수와 자료형'},
  {q:'Q11. 15 % 4의 결과는?',opts:['1','2','3','4'],ans:3,unit:'연산자'},
  {q:'Q12. int a=5; int b=a++; 실행 후 a와 b의 값은?',opts:['a=5 b=5','a=6 b=5','a=5 b=6','a=6 b=6'],ans:2,unit:'연산자'},
  {q:'Q13. x *= y + 1을 풀어 쓰면?',opts:['x = x * y + 1','x = x * (y + 1)','x = (x * y) + 1','x = x + y * 1'],ans:2,unit:'연산자'},
  {q:'Q14. (3 > 5) || (4 < 6)의 결과는?',opts:['0','1','true','false'],ans:2,unit:'연산자'},
  {q:'Q15. 20 << 1의 결과는?',opts:['5','10','40','80'],ans:3,unit:'연산자'},
  {q:'Q16. !0의 결과는?',opts:['0','1','-1','undefined'],ans:2,unit:'연산자'},
  {q:'Q17. 2 & 3의 결과는?',opts:['0','1','2','3'],ans:3,unit:'연산자'},
  {q:'Q18. 5 ^ 3의 결과는? (비트 XOR)',opts:['6','7','8','15'],ans:1,unit:'연산자'},
  {q:'Q19. a -= 3과 동일한 표현은?',opts:['a = 3 - a','a = a + 3','a = a - 3','a = -3'],ans:3,unit:'연산자'},
  {q:'Q20. 나눗셈 연산 5 / 2의 결과는? (int형)',opts:['2','2.5','3','1'],ans:1,unit:'연산자'},
  {q:'Q21. if문에서 조건식이 참일 때 실행되는 블록은?',opts:['else 블록','else if 블록','if 블록','switch 블록'],ans:3,unit:'조건문'},
  {q:'Q22. switch문에서 각 case 끝에 없으면 다음 case로 넘어가는 키워드는?',opts:['return','exit','break','continue'],ans:3,unit:'조건문'},
  {q:'Q23. 다음 중 삼항 연산자의 올바른 형태는?',opts:['a ? b : c','a : b ? c','a ?? b : c','a ? b ?? c'],ans:1,unit:'조건문'},
  {q:'Q24. if-else if-else 구조에서 else 블록이 실행되는 조건은?',opts:['항상','첫 번째 조건이 참','모든 조건이 거짓','마지막 조건이 참'],ans:3,unit:'조건문'},
  {q:'Q25. switch문에서 어떤 case도 일치하지 않을 때 실행되는 블록은?',opts:['else','default','break','return'],ans:2,unit:'조건문'},
  {q:'Q26. int x=10; if(x=0) 실행 후 if블록은?',opts:['실행됨','실행 안됨','오류 발생','무한루프'],ans:2,unit:'조건문'},
  {q:'Q27. 중첩 if문에서 else는 어떤 if와 짝을 이루는가?',opts:['가장 가까운 if','가장 먼 if','첫 번째 if','마지막 else if'],ans:1,unit:'조건문'},
  {q:'Q28. 조건식 (a >= 0 && a <= 100)이 참인 경우는?',opts:['a=101','a=-1','a=50','a=200'],ans:3,unit:'조건문'},
  {q:'Q29. if(a>b) x=1; else x=0; 를 삼항으로 바꾸면?',opts:['x = a < b ? 1 : 0','x = a > b ? 0 : 1','x = a > b ? 1 : 0','x = a != b ? 1 : 0'],ans:3,unit:'조건문'},
  {q:'Q30. switch문에서 case에 사용할 수 없는 것은?',opts:['정수 상수','문자 상수','변수','열거형 상수'],ans:3,unit:'조건문'},
  {q:'Q31. for(int i=0; i<5; i++)에서 반복 횟수는?',opts:['4','5','6','무한'],ans:2,unit:'반복문'},

const UNITS = [...new Set(ALL_QUESTIONS.map(q => q.unit))];
 
let selectedUnit = null;
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let wrongs = [];
let studentId = '';
let studentName = '';
 
// 단원 버튼 생성
function initUnits() {
  const grid = document.getElementById('unit-grid');
  UNITS.forEach(unit => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn';
    btn.innerHTML = `<span class="dot"></span>${unit}`;
    btn.onclick = () => selectUnit(unit, btn);
    grid.appendChild(btn);
  });
  document.getElementById('student-id').addEventListener('input', checkStart);
  document.getElementById('student-name').addEventListener('input', checkStart);
}
 
function selectUnit(unit, btn) {
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedUnit = unit;
  checkStart();
}
 
function checkStart() {
  const id = document.getElementById('student-id').value.trim();
  const name = document.getElementById('student-name').value.trim();
  document.getElementById('start-btn').disabled = !(id && name && selectedUnit);
}
 
function startQuiz() {
  studentId = document.getElementById('student-id').value.trim();
  studentName = document.getElementById('student-name').value.trim();
  questions = ALL_QUESTIONS.filter(q => q.unit === selectedUnit).sort(() => Math.random() - 0.5);
  current = 0; score = 0; wrongs = [];
  show('quiz');
  renderQuestion();
}
 
function renderQuestion() {
  const q = questions[current];
  const total = questions.length;
  document.getElementById('progress-bar').style.width = `${(current / total) * 100}%`;
  document.getElementById('q-num').textContent = `${current + 1} / ${total}`;
  document.getElementById('q-unit-tag').textContent = q.unit;
  document.getElementById('question-text').textContent = q.q;
  answered = false;
 
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const nums = ['①','②','③','④'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-num">${nums[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i + 1, btn, q);
    opts.appendChild(btn);
  });
 
  document.getElementById('next-btn').style.display = 'none';
}
 
function selectAnswer(chosen, btn, q) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);
 
  const isCorrect = chosen === q.ans;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  allBtns[q.ans - 1].classList.add('correct');
 
  if (isCorrect) {
    score++;
  } else {
    wrongs.push({ q: q.q, chosen: q.opts[chosen - 1], correct: q.opts[q.ans - 1] });
  }
 
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  const isLast = current === questions.length - 1;
  nextBtn.textContent = isLast ? '결과 보기 →' : '다음 문제 →';
  nextBtn.className = isLast ? 'next-btn primary' : 'next-btn';
}
 
function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}
 
function showResult() {
  show('result');
  const total = questions.length;
  const rate = Math.round((score / total) * 100);
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-total').textContent = `/ ${total}`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total - score;
  document.getElementById('stat-rate').textContent = rate + '%';
 
  let title, sub;
  if (rate === 100) { title = '완벽해요! 🎉'; sub = '모든 문제를 맞혔습니다.'; }
  else if (rate >= 80) { title = '잘했어요! 👏'; sub = '조금만 더 복습하면 완벽합니다.'; }
  else if (rate >= 60) { title = '괜찮아요 💪'; sub = '오답을 다시 한 번 확인해보세요.'; }
  else { title = '더 공부해봐요 📚'; sub = '오답 노트를 꼼꼼히 확인하세요.'; }
  document.getElementById('score-title').textContent = title;
  document.getElementById('score-sub').textContent = sub;
 
  const review = document.getElementById('review-list');
  review.innerHTML = '';
  if (wrongs.length === 0) {
    review.innerHTML = '<div style="color:var(--accent);font-family:var(--mono);font-size:13px;padding:16px 0">모든 문제를 맞혔습니다!</div>';
  } else {
    wrongs.forEach(w => {
      review.innerHTML += `
        <div class="review-item">
          <span class="review-icon">✗</span>
          <div>
            <div class="review-q">${w.q}</div>
            <div class="review-ans">
              <span class="wrong-ans">내 답: ${w.chosen}</span>
              &nbsp;&nbsp;
              <span class="correct">정답: ${w.correct}</span>
            </div>
          </div>
        </div>`;
    });
  }
 
  saveToNotion(rate, total);
}
 
async function saveToNotion(rate, total) {
  const statusEl = document.getElementById('notion-status');
  const statusText = document.getElementById('notion-status-text');
 
  try {
    const wrongNums = wrongs.map(w => w.q.split('.')[0]).join(', ') || '없음';
    const body = {
      이름: studentName,
      학번: studentId,
      단원: selectedUnit,
      점수: `${score} / ${total}`,
      정답률: `${rate}%`,
      오답문제: wrongNums,
      제출시각: new Date().toLocaleString('ko-KR')
    };
 
    const res = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
 
    if (res.ok) {
      statusEl.className = 'notion-status success';
      statusText.textContent = '✓ 결과가 저장되었습니다.';
    } else {
      throw new Error('서버 오류');
    }
  } catch (e) {
    statusEl.className = 'notion-status error';
    statusText.textContent = '⚠ 저장 실패 — 잠시 후 다시 시도해주세요.';
    console.error('저장 오류:', e);
  }
}
 
function resetQuiz() {
  selectedUnit = null;
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('start-btn').disabled = true;
  show('select');
}
 
function show(screen) {
  ['select','loading','quiz','result'].forEach(s => {
    document.getElementById(`screen-${s}`).style.display = s === screen ? 'block' : 'none';
  });
}
 
initUnits();
</script>
